name: Admin validation
on:
  push:
    branches: [codex/admin-production]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace=apps/admin-platform
      - run: npm run build --workspace=apps/admin-platform
